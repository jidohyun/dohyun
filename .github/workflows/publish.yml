name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  build-daemon:
    name: Build daemon release (${{ matrix.target }})
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: darwin-arm64
            runs-on: macos-14
          - target: linux-x64
            # 22.04 for the older glibc baseline — binaries produced here
            # run on anything glibc 2.31+.
            runs-on: ubuntu-22.04
          - target: linux-arm64
            runs-on: ubuntu-22.04-arm
          # darwin-x64 (macos-13) skipped: GitHub-hosted Intel macOS runners
          # are being deprecated and queue times are unbounded. Track
          # plan-windows-daemon.md for x64 + Windows revival.
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.17'
          otp-version: '27'
      - name: Sync sub-package versions with the git tag
        run: |
          export VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting main package.json + sub-packages to $VERSION"
          node -e "
            const fs = require('node:fs');
            const pkgPath = 'package.json';
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            pkg.version = process.env.VERSION;
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
          "
          node scripts/sync-daemon-versions.mjs
          echo '--- after sync ---'
          cat packages/daemon-${{ matrix.target }}/package.json | grep version
      - name: Build release
        run: scripts/build-daemon-release.sh ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: daemon-${{ matrix.target }}
          path: packages/daemon-${{ matrix.target }}/release
          retention-days: 3

  publish-daemon:
    name: Publish daemon sub-packages
    needs: build-daemon
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org
      - name: Sync sub-package versions with the git tag
        run: |
          export VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting main package.json + sub-packages to $VERSION"
          node -e "
            const fs = require('node:fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.env.VERSION;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          node scripts/sync-daemon-versions.mjs
      - uses: actions/download-artifact@v4
        with:
          pattern: daemon-*
          path: release-artifacts
      - name: Place artifacts into each sub-package
        run: |
          for target in darwin-arm64 linux-x64 linux-arm64; do
            src="release-artifacts/daemon-$target"
            dst="packages/daemon-$target/release"
            rm -rf "$dst"
            mv "$src" "$dst"
          done
      - name: Publish each sub-package (skip if already on registry)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # --provenance requires the package to already exist on the registry
        # (OIDC flow attaches to existing metadata). First release of each
        # sub-package has to be published without it; subsequent 0.x.y
        # patches can add provenance back once the name is reserved.
        run: |
          for target in darwin-arm64 linux-x64 linux-arm64; do
            version=$(node -p "require('./packages/daemon-$target/package.json').version")
            name="@jidohyun/dohyun-daemon-$target"
            if npm view "$name@$version" version > /dev/null 2>&1; then
              echo "==> $name@$version already published — skipping"
              continue
            fi
            (cd "packages/daemon-$target" && npm publish --access public)
          done

  publish-main:
    name: Publish main package
    needs: publish-daemon
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org
          cache: npm
      # npm install (not npm ci) so the lock file can accept newly-bumped
      # daemon sub-package versions. The sub-packages are optional at install
      # time; the daemon E2E tests skip when there's no bundle on disk.
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - run: npm test
      - name: Publish (skip if already on registry)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          version=$(node -p "require('./package.json').version")
          if npm view "@jidohyun/dohyun@$version" version > /dev/null 2>&1; then
            echo "==> @jidohyun/dohyun@$version already published — skipping"
            exit 0
          fi
          npm publish --provenance --access public
